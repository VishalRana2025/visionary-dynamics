name: Build and deploy Node.js app to Azure Web App - Visionarydynamicsas

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'   # safer than 24

      # 🔥 Install backend deps
      - name: Install backend dependencies
        run: npm install

      # 🔥 Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 🔥 Copy build into backend
      - name: Copy frontend build to backend
        run: |
          cp -r frontend/dist ./dist

      # 🔥 Upload ready-to-deploy app
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Visionarydynamicsas'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8638CC051D4B4373999053FF79DFA659 }}